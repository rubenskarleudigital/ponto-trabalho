<script>
let intervalo;
let timeoutNotificacao;

async function pedirPermissao() {
  if ("Notification" in window) {
    if (Notification.permission !== "granted") {
      await Notification.requestPermission();
    }
  }
}

function calcular() {
  const entrada = document.getElementById("entrada").value;
  if (!entrada) return;

  pedirPermissao();

  const [h, m] = entrada.split(":").map(Number);
  const base = new Date();
  base.setHours(h, m, 0, 0);

  const saidaNormal = new Date(base.getTime() + 440 * 60000);

  document.getElementById("resultado").innerHTML =
    `Saída normal: ${formatar(saidaNormal)}`;

  iniciarContador(saidaNormal);
  agendarNotificacao(saidaNormal);
}

function formatar(data) {
  return data.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function iniciarContador(alvo) {
  clearInterval(intervalo);

  intervalo = setInterval(() => {
    const agora = new Date();
    const diff = alvo - agora;

    if (diff <= 0) {
      document.getElementById("contador").innerText = "Expediente encerrado";
      clearInterval(intervalo);
      return;
    }

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById("contador").innerText =
      `Faltam ${h}h ${m}m ${s}s`;
  }, 1000);
}

function agendarNotificacao(alvo) {
  const agora = new Date();
  const delay = alvo - agora;

  if (delay <= 0) return;

  clearTimeout(timeoutNotificacao);

  timeoutNotificacao = setTimeout(() => {
    if (navigator.serviceWorker) {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification("Hora de bater o ponto", {
          body: "Sua jornada de 7h20 terminou.",
          vibrate: [200, 100, 200],
          requireInteraction: true
        });
      });
    }

    tocarSom();
  }, delay);
}

function tocarSom() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
  audio.play();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
